<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory Management System{% endblock %}</title>
    <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='images/database.png') }}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    {% include 'partials/sidebar.html' %}

    <!-- Main Content -->
    <div class="main-content">
        <!-- Flash Messages -->
        {% include 'partials/flash_messages.html' %}

        <!-- Page Content -->
        {% block content %}{% endblock %}
    </div>

    <!-- JavaScript -->
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
    
    <!-- Load Chart.js from CDN first -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Then load your custom charts.js helper functions -->
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
</body>
</html>
